<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,var(--brand-dark,#0d3b20) 0%,var(--brand,#1B5E30) 60%,var(--brand-dark,#0d3b20) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
:root{--brand:#1B5E30;--brand-dark:#0d3b20;--brand-light:#f0fdf4}
.card{background:#fff;border-radius:20px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.card-header{background:linear-gradient(135deg,var(--brand-dark),var(--brand));padding:24px 28px;text-align:center;color:#fff}
.tenant-logo{width:56px;height:56px;border-radius:12px;object-fit:contain;background:#fff;padding:4px;margin-bottom:8px}
.tenant-name{font-size:18px;font-weight:800;margin-bottom:2px}
.tenant-sub{font-size:12px;opacity:.75}
.card-body{padding:24px 28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px}
.field input{width:100%;padding:11px 14px;border:2px solid #e5e5e5;border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:.2s}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,94,48,.08)}
.btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.error{background:#fef2f2;color:#c62828;border:1px solid #fca5a5;display:block}
.msg.success{background:var(--brand-light);color:#166534;border:1px solid #bbf7d0;display:block}
.footer-links{text-align:center;padding:14px 20px;font-size:11px;color:#9ca3af;border-top:1px solid #f3f4f6}
.footer-links a{color:var(--brand);text-decoration:none}
.skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px;height:18px;width:120px;margin:0 auto}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header" id="card-header">
    <div class="skeleton" id="header-skeleton"></div>
  </div>
  <div class="card-body">
    <div id="msg" class="msg"></div>
    <div id="form-owner" style="display:none">
      <!-- Owner: 2-step (pass + OTP) -->
      <div id="step1">
        <div class="field"><label>الإيميل</label><input id="o-email" type="email" placeholder="you@company.com" autocomplete="email"></div>
        <div class="field"><label>كلمة السر</label><input id="o-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn" id="btn-owner" onclick="ownerStep1()">دخول ← إرسال كود</button>
      </div>
      <div id="step2" style="display:none">
        <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px;font-size:12px;color:#78350f;text-align:center;margin-bottom:14px">
          📧 تم إرسال كود التحقق على إيميلك — <strong>الكود صالح 10 دقائق</strong>
        </div>
        <div class="field"><label>كود التحقق (6 أرقام)</label><input id="o-otp" type="text" maxlength="6" placeholder="000000" style="text-align:center;font-size:22px;font-weight:900;letter-spacing:8px" inputmode="numeric" autocomplete="one-time-code"></div>
        <button class="btn" id="btn-otp" onclick="ownerStep2()">تأكيد الكود ✓</button>
        <button onclick="resendOTP()" style="background:none;border:none;color:#9ca3af;font-family:Cairo,sans-serif;font-size:12px;cursor:pointer;width:100%;margin-top:8px;padding:4px">⟳ إعادة إرسال الكود</button>
      </div>
    </div>
    <div id="form-staff" style="display:none">
      <!-- Staff: email + password only (slug comes from subdomain) -->
      <div class="field"><label>إيميلك</label><input id="s-email" type="email" placeholder="ahmed@gmail.com" autocomplete="email"></div>
      <div class="field"><label>كلمة السر</label><input id="s-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" id="btn-staff" onclick="staffLogin()">دخول ←</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:#9ca3af">نسيت كلمة السر؟ تواصل مع مديرك</div>
    </div>
    <div id="form-unknown" style="display:none">
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:40px;margin-bottom:10px">⚠️</div>
        <div style="font-weight:700;color:#374151;margin-bottom:6px">شركة غير موجودة</div>
        <div style="font-size:12px;color:#9ca3af">تحقق من الرابط أو تواصل مع الدعم</div>
      </div>
    </div>
  </div>
  <div class="footer-links" id="footer-links"></div>
</div>

<script>
const BASE = '/api';
let tenantData = null;
let ownerEmail = '';

// Detect context
const hostname = window.location.hostname; // e.g. pro-ahmed-store.areejegypt.com
const parts = hostname.split('.');
const isSubdomain = parts.length >= 3 && parts[0].startsWith('pro-'); // pro-*.areejegypt.com
const slug = isSubdomain ? parts[0] : new URLSearchParams(window.location.search).get('slug');
const isOwnerPage = window.location.pathname.startsWith('/owner');

function applyBrand(tenant) {
  if (!tenant) return;
  const color = tenant.brand_color || '#1B5E30';
  document.documentElement.style.setProperty('--brand', color);
  // Derive dark version
  document.documentElement.style.setProperty('--brand-dark', color + 'cc');
}

async function init() {
  const header = document.getElementById('card-header');

  if (isOwnerPage && !slug) {
    // /owner page on main domain — plain owner login
    header.innerHTML = `<div style="font-size:32px;margin-bottom:6px">🏢</div><div class="tenant-name">نظام أريج</div><div class="tenant-sub">دخول صاحب الشركة</div>`;
    document.getElementById('form-owner').style.display = 'block';
    document.getElementById('footer-links').innerHTML = 'موظف؟ <a href="/">ادخل من هنا</a> &nbsp;|&nbsp; <a href="/register/">حساب جديد</a>';
    document.title = 'دخول صاحب الشركة — نظام أريج';
    return;
  }

  if (!slug) {
    // Main domain / = staff page needs slug — redirect to register or show error
    header.innerHTML = `<div style="font-size:32px;margin-bottom:6px">🌿</div><div class="tenant-name">نظام أريج</div><div class="tenant-sub">منصة إدارة الأعمال</div>`;
    document.getElementById('footer-links').innerHTML = '<a href="/register/">سجّل شركتك الآن ←</a>&nbsp;|&nbsp;<a href="/owner/">دخول صاحب الشركة</a>';
    document.getElementById('form-staff').style.display = 'block';
    // Staff on main domain still needs owner_email — hide and show fallback
    document.getElementById('form-staff').innerHTML = `
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:13px;color:#6b7280;margin-bottom:14px">ادخل على رابط الشركة بتاعتك مباشرة</div>
        <div style="font-size:12px;color:#9ca3af">مثال: <strong>pro-ahmed.areejegypt.com</strong></div>
      </div>
    `;
    document.title = 'نظام أريج';
    return;
  }

  // Load tenant info
  try {
    const r = await fetch(`${BASE}/auth/tenant/${slug}`);
    const d = await r.json();

    if (!d.ok) {
      // Unknown slug
      header.innerHTML = `<div style="font-size:28px;margin-bottom:4px">⚠️</div><div class="tenant-name">شركة غير موجودة</div>`;
      document.getElementById('form-unknown').style.display = 'block';
      document.title = 'رابط غير صحيح';
      return;
    }

    tenantData = d.tenant;
    applyBrand(tenantData);

    // Build header
    const logoHtml = tenantData.logo_url
      ? `<img src="${tenantData.logo_url}" class="tenant-logo" onerror="this.style.display='none'">`
      : `<div style="font-size:36px;margin-bottom:6px">🌿</div>`;
    header.innerHTML = `${logoHtml}<div class="tenant-name">${tenantData.name}</div><div class="tenant-sub">نظام أريج — تسجيل الدخول</div>`;
    document.title = `دخول — ${tenantData.name}`;

    // Show appropriate form
    if (isOwnerPage) {
      document.getElementById('form-owner').style.display = 'block';
      document.getElementById('footer-links').innerHTML = `موظف؟ <a href="https://pro-${slug}.areejegypt.com/">ادخل من هنا</a>`;
    } else {
      document.getElementById('form-staff').style.display = 'block';
      document.getElementById('footer-links').innerHTML = `صاحب الشركة؟ <a href="/owner/">دخول من هنا</a>`;
    }
  } catch(e) {
    header.innerHTML = `<div class="tenant-name">نظام أريج</div>`;
    document.getElementById('form-staff').style.display = 'block';
  }
}

// Owner Step 1: verify password → send OTP
async function ownerStep1() {
  const email = document.getElementById('o-email').value.trim().toLowerCase();
  const password = document.getElementById('o-pass').value;
  if (!email || !password) return showMsg('الإيميل وكلمة السر مطلوبين');
  const btn = document.getElementById('btn-owner');
  btn.disabled = true; btn.textContent = 'جاري التحقق...';
  const r = await fetch(`${BASE}/auth/owner-verify`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });
  const d = await r.json();
  btn.disabled = false; btn.textContent = 'دخول ← إرسال كود';
  if (d.ok) { ownerEmail = email; document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; clearMsg(); }
  else showMsg(d.error || 'إيميل أو كلمة سر غلط');
}

// Owner Step 2: verify OTP → login
async function ownerStep2() {
  const code = document.getElementById('o-otp').value.trim();
  if (code.length !== 6) return showMsg('ادخل الكود المكون من 6 أرقام');
  const btn = document.getElementById('btn-otp');
  btn.disabled = true; btn.textContent = 'جاري التحقق...';
  const r = await fetch(`${BASE}/auth/owner-otp/verify`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: ownerEmail, code })
  });
  const d = await r.json();
  btn.disabled = false; btn.textContent = 'تأكيد الكود ✓';
  if (d.ok) {
    localStorage.setItem('pro_token', d.token);
    // If on subdomain already — stay; if on main domain — go to subdomain
    if (slug) {
      window.location.href = '/dashboard/#t=' + encodeURIComponent(d.token);
    } else {
      // Need to figure out slug from token — go to dashboard and let it redirect
      window.location.href = '/dashboard/';
    }
  }
  else showMsg(d.error || 'كود غلط أو منتهي');
}

async function resendOTP() {
  if (!ownerEmail) return;
  await fetch(`${BASE}/auth/owner-otp/send`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: ownerEmail }) });
  showMsg('✅ تم إرسال كود جديد', 'success');
}

// Staff login (slug from subdomain — no owner_email needed)
async function staffLogin() {
  const email = document.getElementById('s-email').value.trim().toLowerCase();
  const password = document.getElementById('s-pass').value;
  if (!email || !password) return showMsg('الإيميل وكلمة السر مطلوبين');
  const btn = document.getElementById('btn-staff');
  btn.disabled = true; btn.textContent = 'جاري التحقق...';
  const body = { email, password };
  if (slug) body.slug = slug; // pass slug as backup (Caddy also sends X-Tenant-Slug header)
  const r = await fetch(`${BASE}/users/login`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const d = await r.json();
  btn.disabled = false; btn.textContent = 'دخول ←';
  if (d.ok) {
    localStorage.setItem('pro_token', d.token);
    window.location.href = '/dashboard/#t=' + encodeURIComponent(d.token);
  }
  else showMsg(d.error || 'بيانات غلط');
}

function showMsg(text, type='error') {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + type;
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-owner').style.display !== 'none') {
    document.getElementById('step2').style.display === 'none' ? ownerStep1() : ownerStep2();
  } else { staffLogin(); }
});

// OTP digits only
document.addEventListener('DOMContentLoaded', () => {
  const otpEl = document.getElementById('o-otp');
  if (otpEl) otpEl.addEventListener('input', function(){ this.value = this.value.replace(/\D/g,''); });
});

// Already logged in?
const t = localStorage.getItem('pro_token');
if (t) {
  fetch('/api/auth/me', { headers:{ Authorization:'Bearer '+t } })
    .then(r=>r.json()).then(d => { if (d.ok) window.location.href = '/dashboard/'; }).catch(()=>{});
}

init();
</script>
</body>
</html>
