<!DOCTYPE html>
<!-- Inbox v4 — App Shell | S4-1: icon-only sidebar | آخر تحديث: 2026-05-06 -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox — أريج</title>
  <link rel="stylesheet" href="/dashboard/inbox-v4/inbox.css?v=9">
  <link rel="stylesheet" href="/dashboard/inbox-v4/design-system.css?v=18">
  <link rel="stylesheet" href="/inbox-v4/shell.css?v=6">
</head>
<body>
  <div id="shell-root">

    <!-- Topbar -->
    <header id="shell-topbar" class="shell-topbar">
      <div class="shell-topbar-start">
        <span class="shell-logo">أريج</span>
        <span class="shell-breadcrumb" id="shellBreadcrumb"></span>
      </div>
      <div class="shell-topbar-end">
        <span class="shell-user-name" id="shellUserName"></span>
        <button class="shell-btn-icon" id="shellLogoutBtn" title="تسجيل الخروج">⏻</button>
      </div>
    </header>

    <div class="shell-body">

      <!-- Sidebar -->
      <nav id="shell-sidebar" class="shell-sidebar">

        <!-- التنقل الرئيسي (S4-1: icon-only + tooltips) -->
        <div class="shell-nav-main">
          <a href="/inbox" class="shell-nav-item" data-page="inbox" data-tooltip="الـ Inbox">
            <span class="shell-nav-icon">📥</span>
            <span class="shell-nav-label">الـ Inbox</span>
            <span class="shell-badge" id="shellUnreadBadge" style="display:none"></span>
          </a>
          <a href="/contacts" class="shell-nav-item" data-page="contacts" data-tooltip="جهات الاتصال">
            <span class="shell-nav-icon">👥</span>
            <span class="shell-nav-label">جهات الاتصال</span>
          </a>
          <a href="/reports" class="shell-nav-item" data-page="reports" data-tooltip="التقارير">
            <span class="shell-nav-icon">📊</span>
            <span class="shell-nav-label">التقارير</span>
          </a>
          <a href="/settings" class="shell-nav-item" data-page="settings" data-tooltip="الإعدادات">
            <span class="shell-nav-icon">⚙️</span>
            <span class="shell-nav-label">الإعدادات</span>
          </a>
        </div>

        <!-- أدوات الـ Inbox (S4-1: icon-only + tooltips) -->
        <div class="shell-nav-tools">
          <button class="shell-nav-collapse-toggle" id="shellToolsToggle">
            أدوات الـ Inbox <span class="shell-toggle-arrow">▾</span>
          </button>
          <div class="shell-nav-tools-items" id="shellToolsItems">
            <a href="/inbox/broadcast" class="shell-nav-item shell-nav-sub" data-page="broadcast" data-tooltip="البث الجماعي">
              <span class="shell-nav-icon">📢</span>
              <span class="shell-nav-label">البث الجماعي</span>
            </a>
            <a href="/inbox/scheduled" class="shell-nav-item shell-nav-sub" data-page="scheduled" data-tooltip="المجدولة">
              <span class="shell-nav-icon">🕐</span>
              <span class="shell-nav-label">المجدولة</span>
            </a>
            <a href="/inbox/chatbot" class="shell-nav-item shell-nav-sub" data-page="chatbot" data-tooltip="Chatbot">
              <span class="shell-nav-icon">🤖</span>
              <span class="shell-nav-label">Chatbot</span>
            </a>
          </div>
        </div>

        <!-- حالة الموظف -->
        <div class="shell-agent-status" id="shellAgentStatus">
          <span class="shell-status-dot" id="shellAgentStatusDot"></span>
          <select id="shellAgentStatusSelect" class="shell-status-select">
            <option value="online">متاح</option>
            <option value="busy">مشغول</option>
            <option value="away">غائب</option>
            <option value="offline">غير متاح</option>
          </select>
          <span class="shell-sse-dot" id="shellSseDot" title="اتصال مباشر"></span>
        </div>

      </nav>

      <!-- محتوى الصفحة الرئيسي -->
      <main id="shell-content" class="shell-content">
        <div id="shell-loading" class="shell-loading">
          <div class="shell-spinner"></div>
          <span>جاري التحميل...</span>
        </div>
      </main>

    </div><!-- .shell-body -->
  </div><!-- #shell-root -->

  <!-- ترتيب الـ scripts إلزامي -->
  <!-- Core (مطلوبة قبل كل شيء) -->
  <script src="/dashboard/inbox-v4/store.js?v=2"></script>
  <script src="/dashboard/inbox-v4/api.js?v=3"></script>
  <script src="/dashboard/inbox-v4/stream.js?v=4"></script>

  <!-- Inbox Modules (يُحمَّلون مرة واحدة — Page Inbox يستخدمهم) -->
  <script src="/dashboard/inbox-v4/conv-list.js?v=9"></script>
  <script src="/dashboard/inbox-v4/chat.js?v=5"></script>
  <script src="/dashboard/inbox-v4/reply.js?v=4"></script>
  <script src="/dashboard/inbox-v4/team.js?v=2"></script>
  <script src="/dashboard/inbox-v4/context.js?v=2"></script>
  <script src="/dashboard/inbox-v4/labels.js?v=2"></script>
  <script src="/dashboard/inbox-v4/search.js?v=2"></script>
  <script src="/dashboard/inbox-v4/chatbot.js?v=2"></script>
  <script src="/dashboard/inbox-v4/automation.js?v=2"></script>
  <script src="/dashboard/inbox-v4/scheduled.js?v=2"></script>
  <script src="/dashboard/inbox-v4/ai.js?v=3"></script>
  <script src="/dashboard/inbox-v4/interactive.js?v=2"></script>
  <script src="/dashboard/inbox-v4/catalog.js?v=2"></script>
  <script src="/dashboard/inbox-v4/broadcast.js?v=2"></script>
  <script src="/dashboard/inbox-v4/email.js?v=2"></script>

  <!-- Analytics Module -->
  <script src="/dashboard/inbox-v4/analytics.js?v=7"></script>

  <!-- Settings Modules (ترتيب مهم: sub-modules أولاً) -->
  <script src="/dashboard/inbox-v4/settings/roles.js?v=3"></script>
  <script src="/dashboard/inbox-v4/settings/users.js?v=3"></script>
  <script src="/dashboard/inbox-v4/settings/org.js?v=2"></script>
  <script src="/dashboard/inbox-v4/settings/channels.js?v=2"></script>
  <script src="/dashboard/inbox-v4/settings/inbox-settings.js?v=2"></script>
  <script src="/dashboard/inbox-v4/settings/team.js?v=2"></script>
  <script src="/dashboard/inbox-v4/settings/automation-hub.js?v=4"></script>
  <script src="/dashboard/inbox-v4/settings/labels.js?v=3"></script>
  <script src="/dashboard/inbox-v4/settings/settings-page.js?v=3"></script>

  <!-- App Init (SSE + UI bindings + New Conv Modal) -->
  <script src="/dashboard/inbox-v4/app.js?v=5"></script>

  <!-- Router + Page Modules + Shell (الترتيب إلزامي) -->
  <script src="/inbox-v4/router.js?v=3"></script>
  <script src="/inbox-v4/pages/page-inbox.js?v=7"></script>
  <script src="/inbox-v4/pages/page-contacts.js?v=3"></script>
  <script src="/inbox-v4/pages/page-reports.js?v=4"></script>
  <script src="/inbox-v4/pages/page-settings.js?v=3"></script>
  <script src="/inbox-v4/shell.js?v=7"></script>
</body>
</html>
